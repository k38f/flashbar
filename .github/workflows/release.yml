name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: pypi
  cancel-in-progress: false

jobs:
  build:
    name: Build and verify package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install tools
        run: >-
          python -m pip install
          build
          twine
          "pytest>=7"
          "mypy>=1.8,<1.17"
          check-wheel-contents

      - name: Check version against tag
        run: |
          python - <<'PY'
          import os
          import tomllib
          import flashbar

          with open("pyproject.toml", "rb") as file:
              version = tomllib.load(file)["project"]["version"]

          tag = os.environ["GITHUB_REF_NAME"]

          assert flashbar.__version__ == version, (
              f"flashbar.__version__={flashbar.__version__}, "
              f"pyproject.toml={version}"
          )
          assert tag == f"v{version}", f"tag={tag}, expected=v{version}"
          PY

      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Run mypy
        run: python -m mypy

      - name: Build package
        run: python -m build

      - name: Check distributions
        run: |
          python -m twine check dist/*
          check-wheel-contents dist/*.whl

      - uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish package
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/flashbar

    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
