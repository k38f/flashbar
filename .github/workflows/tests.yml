name: tests

on: [push, pull_request]

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install . "pytest>=7"
      - run: python -m pytest tests/ -v

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m pip install build twine "mypy>=1.8,<1.17" check-wheel-contents
      - run: python -m mypy
      - run: python -m build
      - run: >-
          python -c "import glob, tarfile; path = glob.glob('dist/*.tar.gz')[0]; names = set(tarfile.open(path).getnames()); root = min(name.split('/')[0] for name in names); files = {name[len(root) + 1:] for name in names if name.startswith(root + '/')}; required = {'CHANGELOG.md', 'demo.gif', 'examples.py', 'docs/README.ru.md', 'docs/README.zh-CN.md', 'tests/test_bar.py', 'tests/test_pretty.py', 'tests/test_spinner_edge.py'}; missing = required - files; assert not missing, sorted(missing)"
      - run: python -m twine check dist/*
      - run: check-wheel-contents dist/*.whl
      - run: python -m pip install --force-reinstall dist/*.whl
      - run: python -c "import flashbar; assert flashbar.__version__ == '1.3.0'"
